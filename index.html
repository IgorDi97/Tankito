<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#0a0e14" />
  <meta name="description" content="Encuentra las gasolineras más baratas cerca de ti en España. Precios actualizados, navegación al instante." />

  <title>Tankito — Ahorra en gasolina</title>

  <!-- PWA -->
  <link rel="manifest" href="/manifest.json" />
  <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16.png" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Tankito" />

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet" />

  <!-- Leaflet -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

  <!-- App styles -->
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header>
    <div class="header-row search-row">
      <div class="brand">
        <span class="brand-icon">⛽</span>
        <span class="brand-name">Tankito</span>
      </div>
      <div class="search-wrapper">
        <span class="search-icon">🔍</span>
        <input
          id="search-input"
          type="text"
          placeholder="Buscar gasolinera o ciudad…"
          autocomplete="off"
          spellcheck="false"
        />
        <div id="search-results" class="hidden"></div>
      </div>
    </div>

    <div class="header-row controls-row">
      <div class="fuel-wrapper">
        <select id="fuel-selector">
          <option value="gasolina95">⛽ Gasolina 95</option>
          <option value="gasolina98">⛽ Gasolina 98</option>
          <option value="diesel">🛢️ Diésel</option>
          <option value="dieselPremium">🛢️ Diésel Premium</option>
          <option value="glp">🔥 GLP</option>
        </select>
        <span class="fuel-arrow">▾</span>
      </div>
      <div class="status-bar">
        <span id="status">Cargando…</span>
      </div>
    </div>
  </header>

  <main>
    <div id="map"></div>
    <div id="list-view" class="hidden"></div>
    <button id="btn-locate" title="Mi ubicación" aria-label="Mi ubicación">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="3"/>
        <path d="M12 2v3M12 19v3M2 12h3M19 12h3"/>
      </svg>
    </button>
  </main>

  <nav class="bottom-nav">
    <button id="btn-map" class="nav-item active" aria-label="Mapa">
      <span class="nav-icon">🗺️</span>
      <span class="nav-label">Mapa</span>
    </button>
    <button id="btn-list" class="nav-item" aria-label="Lista">
      <span class="nav-icon">📋</span>
      <span class="nav-label">Lista</span>
    </button>
    <button id="btn-fav" class="nav-item" aria-label="Favoritos">
      <span class="nav-icon">⭐</span>
      <span class="nav-label">Favoritos</span>
      <span id="fav-count" class="nav-badge">0</span>
    </button>
  </nav>

  <!-- Leaflet JS -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <!-- App logic -->
  <script src="app.js"></script>

  <!-- Service Worker registration -->
  <script>
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker
          .register("/sw.js")
          .then((reg) => console.log("✓ Service Worker registrato:", reg.scope))
          .catch((err) => console.error("✗ Service Worker errore:", err));
      });
    }
  </script>
</body>
</html>
