<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tankito — Ahorra en gasolina</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header>
    <div class="header-top">
      <h1>⛽ Tankito</h1>
      <p id="status">Cargando gasolineras…</p>
    </div>

    <div class="search-row">
      <div class="search-wrapper">
        <input
          id="search-input"
          type="text"
          placeholder="🔍 Buscar ciudad o dirección…"
          autocomplete="off"
          spellcheck="false"
        />
        <div id="search-results" class="hidden"></div>
      </div>
      <button id="btn-locate" title="Mi ubicación">📍</button>
    </div>

    <div class="header-controls">
      <select id="fuel-selector">
        <option value="gasolina95">Gasolina 95</option>
        <option value="gasolina98">Gasolina 98</option>
        <option value="diesel">Diésel</option>
        <option value="dieselPremium">Diésel Premium</option>
        <option value="glp">GLP</option>
      </select>
      <div class="view-toggle">
        <button id="btn-map" class="active">🗺️ Mapa</button>
        <button id="btn-list">📋 Lista</button>
        <button id="btn-fav">⭐ <span id="fav-count">0</span></button>
      </div>
    </div>
  </header>

  <div id="map"></div>
  <div id="list-view" class="hidden"></div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="app.js"></script>
</body>
</html>
